apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: yapp-staging-ingressroute-https
  namespace: staging
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`dev-yapp.suitestudy.com`)
      kind: Rule
      services:
        - name: yapp-app-staging-service
          port: 8080
  tls:
    secretName: dev-yapp-tls-cert
